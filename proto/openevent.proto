syntax = "proto3";

package openevent;

option java_package = "io.openevent";
option go_package = "openevent/proto;openevent";

// ============================================================================
// Public enums
// ============================================================================

enum Visibility {
    VISIBILITY_PUBLIC = 0;
    VISIBILITY_PROTECTED = 1;
    VISIBILITY_PRIVATE = 2;
}

enum ChannelFilter {
    CHANNEL_FILTER_ALL = 0;
    CHANNEL_FILTER_JOINED = 1;
    CHANNEL_FILTER_OWNED = 2;
}

// ============================================================================
// Public message types
// ============================================================================

message EventMessage {
    uint64 seq = 1;               // Global message sequence; monotonically increasing; clients must not rely on adjacency
    uint64 ts_ms = 2;             // Unix timestamp in milliseconds when the server receives the publish request
    uint64 channel_id = 3;
    uint64 principal = 4;         // Sender principal
    repeated uint64 recipients = 5;  // Recipient principal list
    bytes payload = 6;
}

message ChannelInfo {
    uint64 channel_id = 1;
    string name = 2;
    Visibility visibility = 3;
    string protocol = 4;          // Protocol label; the server does not validate it
    string description = 5;
    optional uint64 creator = 6;  // Creator principal; unset for the system Channel
    repeated uint64 members = 7;  // Member principal list; empty for the system Channel
}

// ============================================================================
// EventService - message publishing, fetching, and subscription
// ============================================================================

service EventService {
    rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
    rpc Publish(PublishRequest) returns (PublishResponse);
    rpc PublishAutoSeq(PublishAutoSeqRequest) returns (PublishAutoSeqResponse);
    rpc Fetch(FetchRequest) returns (FetchResponse);
    rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);
}

message GetStatusRequest {
    uint64 principal = 1;
    string token = 2;
}

message GetStatusResponse {
    uint64 min_seq = 1;           // Lowest available message sequence; 0 when the message sequence is empty
    uint64 max_seq = 2;           // Highest committed message sequence; 0 when the message sequence is empty
}

message PublishRequest {
    uint64 principal = 1;
    string token = 2;
    uint64 channel_id = 3;
    uint64 seq = 4;               // Expected message sequence; must equal the current max_seq + 1
    repeated uint64 recipients = 6;  // Recipient principal list
    bytes payload = 5;
}

message PublishResponse {
}

message PublishAutoSeqRequest {
    uint64 principal = 1;
    string token = 2;
    uint64 channel_id = 3;
    repeated uint64 recipients = 5;  // Recipient principal list
    bytes payload = 4;
}

message PublishAutoSeqResponse {
    uint64 seq = 1;               // Message sequence allocated and committed by the server
}

message FetchRequest {
    uint64 principal = 1;
    string token = 2;
    uint64 from_seq = 3;          // Inclusive starting sequence; 0 returns an empty result immediately
    uint32 limit = 4;             // Maximum visible messages to return; required; range 1..1000
    bool only_my_recipient = 5;   // If true, return only messages whose recipients contain principal
    repeated uint64 channels = 6;  // Return only messages from these channel IDs; empty disables Channel filtering
}

message FetchResponse {
    repeated EventMessage messages = 1;
    uint64 next_seq = 3;
    uint64 last_seq = 2;
}

message SubscribeRequest {
    uint64 principal = 1;
    string token = 2;
    uint64 from_seq = 3;          // Starting sequence; 0 starts after the current max_seq
    bool only_my_recipient = 4;   // If true, push only messages whose recipients contain principal
}

message SubscribeResponse {
    oneof result {
        EventMessage message = 1; // Message delivered by the subscription
        uint64 next_seq = 2;      // Suggested next start when from_seq > max_seq; the stream then ends
    }
}

// ============================================================================
// ChannelService - Channel management
// ============================================================================

service ChannelService {
    rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);
    rpc GetChannel(GetChannelRequest) returns (GetChannelResponse);
    rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);
    rpc AddMember(AddMemberRequest) returns (AddMemberResponse);
    rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse);
}

message CreateChannelRequest {
    uint64 principal = 1;
    string token = 2;
    string name = 3;
    Visibility visibility = 4;    // Defaults to VISIBILITY_PUBLIC when unset under proto3
    string protocol = 5;          // Optional protocol label
    string description = 6;
    repeated uint64 members = 7;  // Member principal list
}

message CreateChannelResponse {
    ChannelInfo channel = 1;
}

message GetChannelRequest {
    uint64 principal = 1;
    string token = 2;
    uint64 channel_id = 3;
}

message GetChannelResponse {
    ChannelInfo channel = 1;
}

message ListChannelsRequest {
    uint64 principal = 1;
    string token = 2;
    ChannelFilter filter = 3;     // Defaults to CHANNEL_FILTER_ALL when unset under proto3
}

message ListChannelsResponse {
    repeated ChannelInfo channels = 1;
}

message AddMemberRequest {
    uint64 principal = 1;         // Operator; must be the creator
    string token = 2;
    uint64 channel_id = 3;
    uint64 target_principal = 4;  // Principal to add as a member
}

message AddMemberResponse {}

message RemoveMemberRequest {
    uint64 principal = 1;         // Operator; must be the creator
    string token = 2;
    uint64 channel_id = 3;
    uint64 target_principal = 4;  // Principal to remove from the members
}

message RemoveMemberResponse {}
